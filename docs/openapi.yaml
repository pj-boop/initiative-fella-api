        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/batch/heal:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Heal multiple initiative entries
      requestBody:
        $ref: '#/components/requestBodies/BatchAmountBody'
      responses:
        '200':
          $ref: '#/components/responses/BatchEntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/batch/temp-hp:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Set temporary HP for multiple initiative entries
      requestBody:
        $ref: '#/components/requestBodies/BatchAmountBody'
      responses:
        '200':
          $ref: '#/components/responses/BatchEntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/batch/conditions:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Add or remove a condition for multiple initiative entries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchConditionRequest'
      responses:
        '200':
          $ref: '#/components/responses/BatchEntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
    patch:
      tags: [Initiative Entries]
      summary: Update an initiative entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInitiativeEntryRequest'
      responses:
        '200':
          $ref: '#/components/responses/EntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Initiative Entries]
      summary: Remove an initiative entry from turn order
      description: Marks the entry status as `removed` rather than deleting the subdocument.
      responses:
        '200':
          description: Entry removed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EntryMutationResponse'
                  - type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: Entry removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/damage:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
    post:
      tags: [Initiative Entries]
      summary: Apply damage to an initiative entry
      requestBody:
        $ref: '#/components/requestBodies/AmountBody'
      responses:
        '200':
          $ref: '#/components/responses/EntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/heal:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
    post:
      tags: [Initiative Entries]
      summary: Heal an initiative entry
      requestBody:
        $ref: '#/components/requestBodies/AmountBody'
      responses:
        '200':
          $ref: '#/components/responses/EntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/temp-hp:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
    post:
      tags: [Initiative Entries]
      summary: Set temporary HP for an initiative entry
      requestBody:
        $ref: '#/components/requestBodies/AmountBody'
      responses:
        '200':
          $ref: '#/components/responses/EntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/conditions:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
    post:
      tags: [Initiative Entries]
      summary: Add a condition to an initiative entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [condition]
              additionalProperties: false
              properties:
                condition:
                  type: string
                  minLength: 1
                  example: prone
      responses:
        '200':
          $ref: '#/components/responses/EntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/conditions/{condition}:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
      - name: condition
        in: path
        required: true
        schema:
          type: string
        description: Condition text to remove.
    delete:
      tags: [Initiative Entries]
      summary: Remove a condition from an initiative entry
      responses:
        '200':
          $ref: '#/components/responses/EntryMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/consumables:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
    post:
      tags: [Initiative Entries]
      summary: Add a consumable to an initiative entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsumableRequest'
      responses:
        '201':
          description: Consumable added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumableMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/consumables/{consumableId}:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
      - $ref: '#/components/parameters/ConsumableId'
    patch:
      tags: [Initiative Entries]
      summary: Update an initiative entry consumable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConsumableRequest'
      responses:
        '200':
          description: Consumable updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumableMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Initiative Entries]
      summary: Remove an initiative entry consumable
      responses:
        '200':
          description: Consumable removed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EntryMutationResponse'
                  - type: object
                    required: [message]
                    properties:
                      message:
                        type: string
                        example: Consumable removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/{entryId}/consumables/{consumableId}/use:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
      - $ref: '#/components/parameters/EntryId'
      - $ref: '#/components/parameters/ConsumableId'
    post:
      tags: [Initiative Entries]
      summary: Use one charge of a consumable
      responses:
        '200':
          description: Consumable used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumableMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    LevelUpSessionId:
      name: sessionId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
      description: Level-up session identifier.
    LevelUpToken:
      name: token
      in: path
      required: true
      schema:
        type: string
      description: Public level-up session token.
    EncounterId:
      name: encounterId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    ConsumableId:
      name: consumableId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ObjectId'
    CampaignIdQuery:
      name: campaignId
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/ObjectId'
      description: Optional campaign filter.
    CharacterTypeQuery:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/CharacterType'
      description: Optional type filter. The backend lowercases the value before filtering.
    CharacterDispositionQuery:
      name: disposition
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/CharacterDisposition'
      description: Optional disposition filter. The backend lowercases the value before filtering.
    EncounterStatusQuery:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/EncounterStatus'
      description: Optional status filter. The backend lowercases the value before filtering.
  requestBodies:
    AmountBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount]
            additionalProperties: false
            properties:
              amount:
                type: integer
                minimum: 0
                description: Damage and healing require a positive integer; temp HP accepts zero.
                example: 5
    BatchAmountBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchAmountRequest'
  responses:
    BadRequest:
      description: Invalid input.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Requested resource was not found for the authenticated user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    TurnResponse:
      description: Encounter turn state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TurnResponse'
    EntryMutationResponse:
      description: Entry and containing encounter after mutation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EntryMutationResponse'
    EntryMutationCreatedResponse:
      description: Entry created and containing encounter after mutation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EntryMutationResponse'
    BatchEntryMutationResponse:
      description: Entries and containing encounter after mutation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BatchEntryMutationResponse'
  schemas:
    ObjectId:
      type: string
      pattern: '^[0-9a-fA-F]{24}$'
      example: 65f1c2a3b4d5e6f7890abc12
    DateTime:
      type: string
      format: date-time
      example: '2026-05-07T00:00:00.000Z'
    CharacterType:
      type: string
      enum: [player, npc, monster]
    CharacterDisposition:
      type: string
      enum: [friendly, hostile, neutral]
    InitiativeMode:
      type: string
      enum: [roll, auto, manual]
      description: roll uses d20 + initiativeBonus; auto uses 10 + initiativeBonus; manual leaves initiative blank.
    EncounterStatus:
      type: string
      enum: [draft, active, completed]
    EntryStatus:
      type: string
      enum: [active, down, dead, removed]
    ConsumableResetOn:
      type: string
      enum: [shortRest, longRest, never]
      default: never
    ApiError:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Invalid credentials
    AuthUser:
      type: object
      required: [id, username, email, profileImage, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        username:
          type: string
          minLength: 3
          example: fella
        email:
          type: string
          format: email
          example: fella@example.com
        profileImage:
          type: string
          default: ''
          example: https://api.dicebear.com/7.x/avataaars/svg?seed=fella
        createdAt:
          $ref: '#/components/schemas/DateTime'
    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT signed with the user id and a 15 day expiration.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/AuthUser'
    RegisterRequest:
      type: object
      required: [username, email, password]
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 3
          example: fella
        email:
          type: string
          format: email
          example: fella@example.com
        password:
          type: string
          minLength: 6
          format: password
          writeOnly: true
          example: secret123
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          example: fella@example.com
        password:
          type: string
          format: password
          writeOnly: true
          example: secret123
    ForgotPasswordRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          example: fella@example.com
    ResetPasswordRequest:
      type: object
      required: [token, password]
      additionalProperties: false
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 6
          format: password
          writeOnly: true
          example: newsecret123
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    PasswordResetRequestResponse:
      allOf:
        - $ref: '#/components/schemas/MessageResponse'
        - type: object
          properties:
            resetToken:
              type: string
              description: Included only outside production until email delivery is configured.
    Campaign:
      type: object
      required: [_id, user, name, notes, defaultPartyCharacterIds, createdAt, updatedAt]
      properties:
        _id:
          $ref: '#/components/schemas/ObjectId'
        user:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
          example: Storm King's Thunder
        notes:
          type: string
          default: ''
        defaultPartyCharacterIds:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/ObjectId'
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
    CreateCampaignRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        notes:
          type: string
          default: ''
    UpdateCampaignRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
        notes:
          type: string
        defaultPartyCharacterIds:
          type: array
          items:
            $ref: '#/components/schemas/ObjectId'
    Character:
      type: object
      required: [_id, user, campaign, name, type, disposition, level, maxHp, armorClass, initiativeBonus, stats, consumables, notes, createdAt, updatedAt]
      properties:
        _id:
          $ref: '#/components/schemas/ObjectId'
        user:
          $ref: '#/components/schemas/ObjectId'
        campaign:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
          example: Briv Stonehide
        type:
          $ref: '#/components/schemas/CharacterType'
        disposition:
          $ref: '#/components/schemas/CharacterDisposition'
        level:
          type: integer
          minimum: 1
          maximum: 20
          default: 1
          example: 7
        maxHp:
          type: integer
          minimum: 0
          example: 42
        armorClass:
          type: integer
          minimum: 0
          default: 10
          example: 16
        initiativeBonus:
          type: integer
          default: 0
          example: 2
        stats:
          type: object
          additionalProperties: true
          default: {}
          example:
            str: 16
            dex: 14
            con: 15
        consumables:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Consumable'
          description: Character model stores consumables as mixed objects; this schema documents the supported consumable shape used by encounter entries.
        notes:
          type: string
          default: ''
          example: Front-line fighter.
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
    CreateCharacterRequest:
      type: object
      required: [campaignId, name, type, maxHp]
      additionalProperties: false
      properties:
        campaignId:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
        type:
          $ref: '#/components/schemas/CharacterType'
        disposition:
          $ref: '#/components/schemas/CharacterDisposition'
        level:
          type: integer
          minimum: 1
          maximum: 20
          default: 1
          example: 7
        maxHp:
          type: integer
          minimum: 0
        armorClass:
          type: integer
          minimum: 0
          default: 10
        initiativeBonus:
          type: integer
          default: 0
        stats:
          type: object
          additionalProperties: true
          default: {}
        consumables:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Consumable'
        notes:
          type: string
          default: ''
    UpdateCharacterRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/CharacterType'
        disposition:
          $ref: '#/components/schemas/CharacterDisposition'
        level:
          type: integer
          minimum: 1
          maximum: 20
          default: 1
          example: 7
        maxHp:
          type: integer
          minimum: 0
        armorClass:
          type: integer
          minimum: 0
        initiativeBonus:
          type: integer
        stats:
          type: object
          additionalProperties: true
        consumables:
          type: array
          items:
            $ref: '#/components/schemas/Consumable'
        notes:
          type: string

    LevelUpStatus:
      type: string
      enum: [open, completed, discarded, closed]
    LevelUpSubmissionStatus:
      type: string
      enum: [pending, accepted, discarded]
    LevelUpPatch:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        level:
          type: integer
          minimum: 1
          maximum: 20
          example: 8
        maxHp:
          type: integer
          minimum: 1
          example: 61
        armorClass:
          type: integer
          minimum: 1
          maximum: 40
          example: 17
        initiativeBonus:
          type: integer
          minimum: -20
          maximum: 30
          example: 4
        notes:
          type: string
          example: Took Sentinel feat
    LevelUpSnapshot:
      type: object
      additionalProperties: true
      properties:
        level:
          type: integer
          example: 7
        maxHp:
          type: integer
          example: 52
        armorClass:
          type: integer
          example: 16
        initiativeBonus:
          type: integer
          example: 3
        notes:
          type: string
    LevelUpSession:
      type: object
      required: [id, campaign, title, targetLevel, status, expiresAt, allowedCharacterIds, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        campaign:
          $ref: '#/components/schemas/ObjectId'
        title:
          type: string
          example: Level 8 Update
        targetLevel:
          type: integer
          minimum: 1
          maximum: 20
          example: 8
        status:
          $ref: '#/components/schemas/LevelUpStatus'
        expiresAt:
          $ref: '#/components/schemas/DateTime'
        allowedCharacterIds:
          type: array
          items:
            $ref: '#/components/schemas/ObjectId'
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
    CreateLevelUpSessionRequest:
      type: object
      required: [title, targetLevel]
      additionalProperties: false
      properties:
        title:
          type: string
          example: Level 8 Update
        targetLevel:
          type: integer
          minimum: 1
          maximum: 20
          example: 8
        expiresInHours:
          type: number
          exclusiveMinimum: 0
          default: 48
          example: 48
    CreateLevelUpSessionResponse:
      type: object
      required: [sessionId, publicToken, publicUrl]
      properties:
        sessionId:
          $ref: '#/components/schemas/ObjectId'
        publicToken:
          type: string
        publicUrl:
          type: string
