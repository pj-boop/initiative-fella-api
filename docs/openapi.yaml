openapi: 3.1.0
info:
  title: Initiative Fella API
  version: 1.0.0
  description: |
    OpenAPI specification for the Initiative Fella backend.

    Authentication endpoints return a JWT. Send protected requests with
    `Authorization: Bearer <token>`.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Auth
    description: Account registration and login.
  - name: Campaigns
    description: Campaign records and default party membership owned by the authenticated user.
  - name: Characters
    description: Reusable character records owned by the authenticated user.
  - name: Encounters
    description: Encounter lifecycle, initiative order, and turns.
  - name: Initiative Entries
    description: Entries, HP, conditions, and consumables inside an encounter.
  - name: Level-Up Sessions
    description: Authenticated DM workflows and public player submissions for character level updates.
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a user and returns a JWT plus public user profile data.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  username: fella
                  email: fella@example.com
                  password: secret123
      responses:
        '201':
          description: User registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in an existing user
      description: Authenticates by email and password, then returns a JWT plus public user profile data.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: fella@example.com
                  password: secret123
      responses:
        '200':
          description: User authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset token
      description: Stores a hashed reset token for the user if the email exists. Non-production responses include the raw token until email delivery is wired up.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset a password
      description: Replaces the user's password when the reset token is valid and unexpired.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/campaigns:
    get:
      tags: [Campaigns]
      summary: List campaigns
      description: Returns the authenticated user's campaigns sorted by newest first.
      responses:
        '200':
          description: Campaigns found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Campaign'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Campaigns]
      summary: Create a campaign
      description: Default party characters cannot be set during creation; create the campaign first, then use the party endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCampaignRequest'
      responses:
        '201':
          description: Campaign created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/campaigns/{campaignId}:
    parameters:
      - $ref: '#/components/parameters/CampaignId'
    get:
      tags: [Campaigns]
      summary: Get a campaign
      responses:
        '200':
          description: Campaign found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Campaigns]
      summary: Update a campaign
      description: When updating defaultPartyCharacterIds, every character must belong to the authenticated user and this campaign.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCampaignRequest'
      responses:
        '200':
          description: Campaign updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Campaigns]
      summary: Delete a campaign
      responses:
        '200':
          description: Campaign and related character/encounter data deleted.
          content:
            application/json:
              schema:
                type: object
                required: [message, campaign]
                properties:
                  message:
                    type: string
                    example: Campaign and related data deleted
                  campaign:
                    $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/campaigns/{campaignId}/party/{characterId}:
    parameters:
      - $ref: '#/components/parameters/CampaignId'
      - $ref: '#/components/parameters/CharacterId'
    post:
      tags: [Campaigns]
      summary: Add a character to a campaign's default party
      responses:
        '200':
          description: Campaign updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Campaigns]
      summary: Remove a character from a campaign's default party
      responses:
        '200':
          description: Campaign updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/campaigns/{campaignId}/level-up-sessions:
    parameters:
      - $ref: '#/components/parameters/CampaignId'
    post:
      tags: [Level-Up Sessions]
      summary: Open a level-up session
      description: Creates a public token for the campaign's default party characters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLevelUpSessionRequest'
      responses:
        '201':
          description: Level-up session opened.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLevelUpSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/campaigns/{campaignId}/level-up-sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/CampaignId'
      - $ref: '#/components/parameters/LevelUpSessionId'
    get:
      tags: [Level-Up Sessions]
      summary: Review a level-up session
      description: Returns submissions and names of allowed characters that have not submitted a pending or accepted update.
      responses:
        '200':
          description: Level-up session review data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelUpSessionReviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/campaigns/{campaignId}/level-up-sessions/{sessionId}/accept-all:
    parameters:
      - $ref: '#/components/parameters/CampaignId'
      - $ref: '#/components/parameters/LevelUpSessionId'
    post:
      tags: [Level-Up Sessions]
      summary: Accept all pending level-up submissions
      description: Applies each pending patch to its character, marks submissions accepted, completes the session, and invalidates the public token.
      responses:
        '200':
          description: Pending submissions accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelUpBulkActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/campaigns/{campaignId}/level-up-sessions/{sessionId}/discard-all:
    parameters:
      - $ref: '#/components/parameters/CampaignId'
      - $ref: '#/components/parameters/LevelUpSessionId'
    post:
      tags: [Level-Up Sessions]
      summary: Discard all pending level-up submissions
      description: Marks pending submissions discarded, discards the session, invalidates the public token, and leaves characters unchanged.
      responses:
        '200':
          description: Pending submissions discarded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelUpBulkActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/public/level-up-sessions/{token}:
    parameters:
      - $ref: '#/components/parameters/LevelUpToken'
    get:
      tags: [Level-Up Sessions]
      summary: Get public level-up session details
      security: []
      description: Returns safe public session data without user ids, token hashes, or private campaign data.
      responses:
        '200':
          description: Public level-up session details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicLevelUpSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Level-up session is no longer open.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/public/level-up-sessions/{token}/characters/{characterId}/submissions:
    parameters:
      - $ref: '#/components/parameters/LevelUpToken'
      - $ref: '#/components/parameters/CharacterId'
    post:
      tags: [Level-Up Sessions]
      summary: Submit a public character level-up update
      security: []
      description: Creates or replaces the pending submission for a character without immediately changing the character.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitLevelUpSubmissionRequest'
      responses:
        '200':
          description: Pending submission created or replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitLevelUpSubmissionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          description: Level-up session is no longer open.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/characters:
    get:
      tags: [Characters]
      summary: List characters
      description: Returns the authenticated user's characters sorted by newest first.
      parameters:
        - $ref: '#/components/parameters/CharacterTypeQuery'
        - $ref: '#/components/parameters/CharacterDispositionQuery'
        - $ref: '#/components/parameters/CampaignIdQuery'
      responses:
        '200':
          description: Characters found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Character'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Characters]
      summary: Create a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
      responses:
        '201':
          description: Character created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/characters/{characterId}:
    parameters:
      - $ref: '#/components/parameters/CharacterId'
    get:
      tags: [Characters]
      summary: Get a character
      responses:
        '200':
          description: Character found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Characters]
      summary: Update a character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCharacterRequest'
      responses:
        '200':
          description: Character updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Characters]
      summary: Delete a character
      responses:
        '200':
          description: Character deleted.
          content:
            application/json:
              schema:
                type: object
                required: [message, character]
                properties:
                  message:
                    type: string
                    example: Character deleted
                  character:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters:
    get:
      tags: [Encounters]
      summary: List encounters
      description: Returns the authenticated user's encounters sorted by newest first.
      parameters:
        - $ref: '#/components/parameters/EncounterStatusQuery'
        - $ref: '#/components/parameters/CampaignIdQuery'
      responses:
        '200':
          description: Encounters found.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Encounter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags: [Encounters]
      summary: Create an encounter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEncounterRequest'
      responses:
        '201':
          description: Encounter created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    get:
      tags: [Encounters]
      summary: Get an encounter
      responses:
        '200':
          description: Encounter found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags: [Encounters]
      summary: Update an encounter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEncounterRequest'
      responses:
        '200':
          description: Encounter updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [Encounters]
      summary: Delete an encounter
      responses:
        '200':
          description: Encounter deleted.
          content:
            application/json:
              schema:
                type: object
                required: [message, encounter]
                properties:
                  message:
                    type: string
                    example: Encounter deleted
                  encounter:
                    $ref: '#/components/schemas/Encounter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/roll-initiative:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Encounters]
      summary: Roll initiative for an encounter
      description: Applies provided manual initiative totals, rolls blank or missing entries when requested, and keeps existing totals unless rerollExisting is true. Optional provided rolls must be integers from 1 to 20.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollInitiativeRequest'
      responses:
        '200':
          $ref: '#/components/responses/TurnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/start:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Encounters]
      summary: Start an encounter
      responses:
        '200':
          $ref: '#/components/responses/TurnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/turns/next:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Encounters]
      summary: Advance to the next turn
      responses:
        '200':
          $ref: '#/components/responses/TurnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/turns/previous:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Encounters]
      summary: Move to the previous turn
      responses:
        '200':
          $ref: '#/components/responses/TurnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/turns/current:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    patch:
      tags: [Encounters]
      summary: Set the current turn or round
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentTurnRequest'
      responses:
        '200':
          $ref: '#/components/responses/TurnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/end:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Encounters]
      summary: End an encounter
      responses:
        '200':
          $ref: '#/components/responses/TurnResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/from-character:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Add an initiative entry from an existing character
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [characterId]
              additionalProperties: false
              properties:
                characterId:
                  $ref: '#/components/schemas/ObjectId'
                initiativeMode:
                  $ref: '#/components/schemas/InitiativeMode'
      responses:
        '201':
          $ref: '#/components/responses/EntryMutationCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/from-party:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Add default party characters to an encounter
      description: Adds entries for the encounter campaign's default party characters, skipping any character already present by entry.characterId.
      responses:
        '201':
          description: Default party entries added.
          content:
            application/json:
              schema:
                type: object
                required: [entries, encounter]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/InitiativeEntry'
                  encounter:
                    $ref: '#/components/schemas/Encounter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/custom:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Add a custom initiative entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInitiativeEntryRequest'
      responses:
        '201':
          $ref: '#/components/responses/EntryMutationCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/encounters/{encounterId}/entries/batch/damage:
    parameters:
      - $ref: '#/components/parameters/EncounterId'
    post:
      tags: [Initiative Entries]
      summary: Apply damage to multiple initiative entries
