    PublicLevelUpCharacter:
      type: object
      required: [id, name, level, maxHp, armorClass, initiativeBonus]
      properties:
        id:
          $ref: '#/components/schemas/ObjectId'
        name:
          type: string
          example: Tharion
        level:
          type: integer
          example: 7
        maxHp:
          type: integer
          example: 52
        armorClass:
          type: integer
          example: 16
        initiativeBonus:
          type: integer
          example: 3
    PublicLevelUpSessionResponse:
      type: object
      required: [title, targetLevel, campaignName, status, characters]
      properties:
        title:
          type: string
          example: Level 8 Update
        targetLevel:
          type: integer
          example: 8
        campaignName:
          type: string
          example: Curse of Strahd
        status:
          $ref: '#/components/schemas/LevelUpStatus'
        characters:
          type: array
          items:
            $ref: '#/components/schemas/PublicLevelUpCharacter'
    SubmitLevelUpSubmissionRequest:
      type: object
