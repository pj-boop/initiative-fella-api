  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/EncounterId'
    - $ref: '../../openapi.yaml#/components/parameters/EntryId'
    - name: condition
      in: path
      required: true
      schema:
        type: string
      description: Condition text to remove.
  delete:
