/api/encounters/{encounterId}/entries/{entryId}:
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/EncounterId'
    - $ref: '../../openapi.yaml#/components/parameters/EntryId'
  patch:
    tags:
      - Initiative Entries
    summary: Update an initiative entry
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/UpdateInitiativeEntryRequest'
    responses:
      '200':
        $ref: '../../openapi.yaml#/components/responses/EntryMutationResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalServerError'
  delete:
    tags:
      - Initiative Entries
    summary: Remove an initiative entry from turn order
    description: Marks the entry status as `removed` rather than deleting the subdocument.
    responses:
      '200':
        description: Entry removed.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../../openapi.yaml#/components/schemas/EntryMutationResponse'
                - type: object
                  required:
                    - message
                  properties:
                    message:
                      type: string
                      example: Entry removed
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalServerError'
