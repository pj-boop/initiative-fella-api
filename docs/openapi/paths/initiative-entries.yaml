/api/encounters/{encounterId}/entries/from-character:
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/EncounterId'
  post:
    tags:
      - Initiative Entries
    summary: Add an initiative entry from an existing character
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - characterId
            additionalProperties: false
            properties:
              characterId:
                $ref: '../../openapi.yaml#/components/schemas/ObjectId'
              initiativeMode:
                $ref: '../../openapi.yaml#/components/schemas/InitiativeMode'
    responses:
      '201':
        $ref: '../../openapi.yaml#/components/responses/EntryMutationCreatedResponse'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalServerError'
/api/encounters/{encounterId}/entries/from-party:
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/EncounterId'
  post:
    tags:
      - Initiative Entries
    summary: Add default party characters to an encounter
    description: >-
      Adds entries for the encounter campaign's default party characters, skipping any character already present by
      entry.characterId.
    responses:
      '201':
        description: Default party entries added.
        content:
          application/json:
            schema:
              type: object
              required:
                - entries
                - encounter
              properties:
                entries:
                  type: array
                  items:
                    $ref: '../../openapi.yaml#/components/schemas/InitiativeEntry'
                encounter:
                  $ref: '../../openapi.yaml#/components/schemas/Encounter'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '401':
        $ref: '../../openapi.yaml#/components/responses/Unauthorized'
      '404':
        $ref: '../../openapi.yaml#/components/responses/NotFound'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalServerError'
/api/encounters/{encounterId}/entries/custom:
