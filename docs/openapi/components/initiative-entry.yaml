EntryStatus:
  type: string
  enum:
    - active
    - down
    - dead
    - removed
InitiativeMode:
  type: string
  enum:
    - roll
    - auto
    - manual
  description: roll uses d20 + initiativeBonus; auto uses 10 + initiativeBonus; manual leaves initiative blank.
InitiativeEntry:
  type: object
  required:
    - _id
    - name
    - type
    - disposition
    - maxHp
    - currentHp
    - tempHp
    - armorClass
    - initiativeBonus
    - initiativeRoll
    - initiativeSource
    - initiativeTotal
    - stats
    - consumables
    - conditions
    - status
    - notes
    - createdAt
    - updatedAt
  properties:
    _id:
      $ref: '../../openapi.yaml#/components/schemas/ObjectId'
    characterId:
      oneOf:
        - $ref: '../../openapi.yaml#/components/schemas/ObjectId'
        - type: 'null'
      description: Source character id when the entry was created from a character.
    name:
      type: string
    type:
      $ref: '../../openapi.yaml#/components/schemas/CharacterType'
    disposition:
      $ref: '../../openapi.yaml#/components/schemas/CharacterDisposition'
    level:
      type: integer
      minimum: 1
      maximum: 20
      default: 1
      example: 7
    maxHp:
      type: integer
      minimum: 0
    currentHp:
      type: integer
      minimum: 0
      description: Defaults to maxHp when omitted.
    tempHp:
      type: integer
      minimum: 0
      default: 0
    armorClass:
      type: integer
      minimum: 0
      default: 10
    initiativeBonus:
      type: integer
      default: 0
    initiativeRoll:
      oneOf:
        - type: integer
        - type: 'null'
      default: null
    initiativeSource:
      oneOf:
        - type: string
          enum:
            - manual
            - auto
        - type: 'null'
      default: null
    initiativeTotal:
      oneOf:
        - type: integer
        - type: 'null'
      default: null
      description: Final initiative total. Manual entries set initiativeRoll to null and initiativeSource to manual.
    stats:
      type: object
      additionalProperties: true
      default: {}
    consumables:
      type: array
      default: []
      items:
        $ref: '../../openapi.yaml#/components/schemas/Consumable'
    conditions:
      type: array
      default: []
      items:
        type: string
    status:
      $ref: '../../openapi.yaml#/components/schemas/EntryStatus'
    notes:
      type: string
      default: ''
    createdAt:
      $ref: '../../openapi.yaml#/components/schemas/DateTime'
    updatedAt:
      $ref: '../../openapi.yaml#/components/schemas/DateTime'
CreateInitiativeEntryRequest:
  type: object
  required:
    - name
    - type
    - maxHp
  additionalProperties: false
  properties:
    characterId:
      $ref: '../../openapi.yaml#/components/schemas/ObjectId'
    name:
      type: string
    type:
      $ref: '../../openapi.yaml#/components/schemas/CharacterType'
    disposition:
      $ref: '../../openapi.yaml#/components/schemas/CharacterDisposition'
    level:
      type: integer
      minimum: 1
      maximum: 20
      default: 1
      example: 7
    maxHp:
      type: integer
      minimum: 0
    currentHp:
      type: integer
      minimum: 0
      description: Defaults to maxHp when omitted.
    tempHp:
      type: integer
      minimum: 0
      default: 0
    armorClass:
      type: integer
      minimum: 0
      default: 10
    initiativeBonus:
      type: integer
      default: 0
    initiativeRoll:
      oneOf:
        - type: integer
        - type: 'null'
      default: null
    initiativeTotal:
      oneOf:
        - type: integer
        - type: 'null'
      default: null
      description: >-
        Provide a final manual initiative total. When set, the API stores initiativeRoll as null and initiativeSource as
        manual.
    initiativeMode:
      $ref: '../../openapi.yaml#/components/schemas/InitiativeMode'
    stats:
      type: object
      additionalProperties: true
      default: {}
    consumables:
      type: array
      default: []
      items:
        $ref: '../../openapi.yaml#/components/schemas/Consumable'
    conditions:
      type: array
      default: []
      items:
        type: string
    status:
      $ref: '../../openapi.yaml#/components/schemas/EntryStatus'
    notes:
      type: string
      default: ''
UpdateInitiativeEntryRequest:
  type: object
  minProperties: 1
  additionalProperties: false
  properties:
    name:
      type: string
    type:
      $ref: '../../openapi.yaml#/components/schemas/CharacterType'
    disposition:
      $ref: '../../openapi.yaml#/components/schemas/CharacterDisposition'
    level:
      type: integer
      minimum: 1
      maximum: 20
      default: 1
      example: 7
    maxHp:
      type: integer
      minimum: 0
    currentHp:
      type: integer
      minimum: 0
    tempHp:
      type: integer
      minimum: 0
    armorClass:
      type: integer
      minimum: 0
    initiativeBonus:
      type: integer
    initiativeRoll:
      oneOf:
        - type: integer
        - type: 'null'
    initiativeTotal:
      oneOf:
        - type: integer
        - type: 'null'
      description: >-
        Provide a final manual initiative total. When set, the API stores initiativeRoll as null and initiativeSource as
        manual.
    stats:
      type: object
      additionalProperties: true
    consumables:
      type: array
      items:
        $ref: '../../openapi.yaml#/components/schemas/Consumable'
    conditions:
      type: array
      items:
        type: string
    status:
      $ref: '../../openapi.yaml#/components/schemas/EntryStatus'
    notes:
      type: string
RollInitiativeRequest:
  type: object
  additionalProperties: false
  properties:
    manualInitiatives:
      type: array
      description: >-
        Manual final integer initiative totals by entry. Applied entries store initiativeRoll as null and
        initiativeSource as manual. Values may be negative, but must be whole numbers.
      items:
        type: object
        additionalProperties: false
        required:
          - entryId
          - initiativeTotal
        properties:
          entryId:
            $ref: '../../openapi.yaml#/components/schemas/ObjectId'
          initiativeTotal:
            type: integer
            description: Final initiative total to use for the entry, without adding initiative bonus.
      example:
        - entryId: 65f1c2a3b4d5e6f7890abc12
          initiativeTotal: 18
        - entryId: 65f1c2a3b4d5e6f7890abc13
          initiativeTotal: 12
    rollMissing:
      type: boolean
      description: Defaults to true. When true, roll initiative for entries that do not have a manual or existing initiative total.
    rerollExisting:
      type: boolean
      description: Defaults to false. When true, reroll entries with existing initiative totals unless a manual total is provided.
    rollsByEntryId:
      type: object
      deprecated: true
      description: Legacy map of initiative entry ids to provided d20 rolls for backend-rolled entries.
      propertyNames:
        pattern: ^[0-9a-fA-F]{24}$
      additionalProperties:
        type: integer
        minimum: 1
        maximum: 20
      example:
        65f1c2a3b4d5e6f7890abc12: 17
UpdateCurrentTurnRequest:
  type: object
  minProperties: 1
  additionalProperties: false
  properties:
    currentTurnIndex:
      type: integer
      minimum: 0
      description: Zero-based index into the encounter entries array. Must point to a turn-eligible entry.
    entryId:
      $ref: '../../openapi.yaml#/components/schemas/ObjectId'
    round:
      type: integer
      minimum: 1
  description: Provide either currentTurnIndex or entryId, not both; round may be included with either selector or by itself.
EntryMutationResponse:
  type: object
  required:
    - entry
    - encounter
  properties:
    entry:
      $ref: '../../openapi.yaml#/components/schemas/InitiativeEntry'
    encounter:
      $ref: '../../openapi.yaml#/components/schemas/Encounter'
BatchEntryMutationResponse:
  type: object
  required:
    - entries
    - encounter
  properties:
    entries:
      type: array
      items:
        $ref: '../../openapi.yaml#/components/schemas/InitiativeEntry'
    encounter:
      $ref: '../../openapi.yaml#/components/schemas/Encounter'
BatchAmountRequest:
  type: object
  required:
    - entryIds
    - amount
  additionalProperties: false
  properties:
    entryIds:
      type: array
      minItems: 1
      items:
        $ref: '../../openapi.yaml#/components/schemas/ObjectId'
    amount:
      type: integer
BatchConditionRequest:
  type: object
  required:
    - entryIds
    - condition
  additionalProperties: false
  properties:
    entryIds:
      type: array
      minItems: 1
      items:
        $ref: '../../openapi.yaml#/components/schemas/ObjectId'
    condition:
      type: string
    action:
      type: string
      enum:
        - add
        - remove
      default: add
